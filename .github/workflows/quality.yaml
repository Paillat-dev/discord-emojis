name: Quality Checks

on:
  workflow_call:

jobs:
  check-license-header:
    name: License Header Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Licensor
        uses: nicebots-xyz/licensor/.github/actions/setup-licensor@v0.0.5
        with:
          version: v0.0.5
      - name: Check Header Compliance
        run: licensor check * --ignore ".*" --ignore build

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, basedpyright]
        include:
          - check: format
            name: "Format Check"
            command: "pdm run format:check"
          - check: lint
            name: "Lint Check"
            command: "pdm run lint"
          - check: basedpyright
            name: "Type Check"
            command: "pdm run typecheck"

    name: ${{ matrix.name }}

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v6

      - name: "Setup PDM"
        uses: pdm-project/setup-pdm@v4

      - name: "Install Dependencies"
        run: "pdm install"

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}