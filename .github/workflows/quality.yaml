name: Quality Checks

on:
  workflow_call:

jobs:
  check-license-header:
    name: License Header Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Licensor
        run: |
          curl -L https://github.com/nicebots-xyz/licensor/releases/download/v0.0.2/licensor-v0.0.2-linux-x86_64.tar.gz -o licensor.tar.gz
          tar -xzf licensor.tar.gz
          sudo mv licensor licensor.jar /usr/local/bin/
          sudo chmod +x /usr/local/bin/licensor
        shell: bash
      - name: Check Header Compliance
        run: licensor check * --ignore ".*" --ignore build

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, basedpyright]
        include:
          - check: format
            name: "Format Check"
            command: "uv run ruff format --check ."
          - check: lint
            name: "Lint Check"
            command: "uv run ruff check ."
          - check: basedpyright
            name: "Type Check"
            command: "uv run basedpyright ."

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}